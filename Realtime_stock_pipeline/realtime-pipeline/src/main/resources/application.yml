spring:

  kafka:
    bootstrap-servers: localhost:9092
   

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

      properties:
        spring.json.add.type.headers: false
    

    consumer:
      group-id: stock-consumer-group
    
      auto-offset-reset: latest
    

      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

      properties:
        spring.json.trusted.packages: "com.pipeline_realtime-pipeline.model"
       

        spring.json.value.default.type: "com.pipeline_realtime-pipeline.model.StockData"
        

  data:
    redis:
      host: localhost
      port: 6379
   

  datasource:
    url: jdbc:postgresql://localhost:5432/pipelinedb
   

    username: admin
    password: admin


    driver-class-name: org.postgresql.Driver
    

    hikari:
      maximum-pool-size: 10

      minimum-idle: 2

     

  jpa:
    hibernate:
      ddl-auto: update
     

    show-sql: true
    
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        

        format_sql: true

        jdbc:
          batch_size: 50
        
  task:
    scheduling:
      pool:
        size: 5
        
server:
  port: 8000
 
logging:
  level:
    com.pipeline: INFO

    org.springframework.kafka: WARN

    org.hibernate.SQL: DEBUG

    com.zaxxer.hikari: WARN
