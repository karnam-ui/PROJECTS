[pytest]
# Pytest configuration for Churn Prediction API

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers for test categorization
markers =
    auth: Tests related to authentication
    predictions: Tests for prediction endpoints
    rate_limit: Tests for rate limiting
    integration: Integration tests

# Timeout for tests (in seconds)
timeout = 30

# Asyncio mode
asyncio_mode = auto
